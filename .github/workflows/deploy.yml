name: 🚀 Spring Boot CI/CD (develop)

on:
  push:
    branches: [ "develop" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create application.yml from Secrets
      run: |
        mkdir -p ./src/main/resources
        echo "${{ secrets.DEVELOPMENT_APPLICATION }}" > ./src/main/resources/application.yml

    - name: Build with Gradle
      run: ./gradlew build -x test

    - name: Docker login & build & push
      run: |
        echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest .
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest
        docker logout

    - name: Upload .env file
      run: echo "TAG=latest" > env.dev

    - name: Send .env to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "env.dev"
        target: "~/"

    - name: Remote deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          chmod +x ~/deploy.sh
          ~/deploy.sh
          docker image prune -f
